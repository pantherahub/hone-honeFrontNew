@if (_visible) {
  <div
    [ngClass]="{
      'fixed': fullscreen,
      'absolute': !fullscreen,
      'bg-gray-50/60': overlay,
    }"
    class="inset-0 z-50 bg-gray-50/60 flex items-center justify-center">
    <svg class="w-7 h-7 text-main-blue1h animate-spin fill-gray-200">
      <use xlink:href="/assets/icons/extras/animations.svg#spin" />
    </svg>
  </div>
}
