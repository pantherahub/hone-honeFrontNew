<nav [attr.aria-label]="ariaLabel" class="flex items-center justify-between gap-4 flex-col xs:flex-row">
  <span class="text-sm text-gray-500 dark:text-gray-400">
    @if (normalizedTotalItems > 0) {
      Mostrando
      <span class="font-semibold text-gray-900 dark:text-white">
        {{ startRange }}-{{ endRange }}
      </span>
      de
      <span class="font-semibold text-gray-900 dark:text-white">{{ normalizedTotalItems }}</span>
    } @else {
      Mostrando 0
    }
  </span>

  <ul class="inline-flex -space-x-px w-full xs:w-auto">
    <li class="grow">
      <button
        type="button"
        (click)="selectPage(effectiveCurrentPage - 1)"
        [disabled]="isPreviousDisabled"
        [class.pointer-events-none]="isPreviousDisabled"
        [class.opacity-50]="isPreviousDisabled"
        class="cursor-pointer flex items-center justify-center font-medium text-sm leading-4 py-1.5 px-3 text-gray-500 bg-white rounded-s-xl hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-gray-700 disabled:cursor-default">
        Anterior
      </button>
    </li>

    @for (page of visiblePages; track page) {
      <li>
        <button
          type="button"
          (click)="selectPage(page)"
          [attr.aria-current]="page === effectiveCurrentPage ? 'page' : null"
          [disabled]="disabled"
          [ngClass]="{
            'text-blue-600 bg-blue-50 dark:bg-gray-700 dark:text-white hover:bg-blue-200 hover:text-blue-700': page === effectiveCurrentPage,
            'text-gray-500 bg-white dark:bg-gray-800 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700': page !== effectiveCurrentPage
          }"
          class="cursor-pointer hidden sm:flex items-center justify-center font-medium text-sm leading-4 py-1.5 px-3 disabled:cursor-default">
          {{ page }}
        </button>
      </li>
    }

    <li class="grow">
      <button
        type="button"
        (click)="selectPage(effectiveCurrentPage + 1)"
        [disabled]="isNextDisabled"
        [class.pointer-events-none]="isNextDisabled"
        [class.opacity-50]="isNextDisabled"
        class="cursor-pointer flex items-center justify-center font-medium text-sm leading-4 py-1.5 px-3 text-gray-500 bg-white rounded-e-xl hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-gray-700 disabled:cursor-default">
        Siguiente
      </button>
    </li>
  </ul>
</nav>
