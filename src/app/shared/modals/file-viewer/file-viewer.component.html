<div class="flex flex-col gap-4">
  <div class="flex items-center justify-between">
    <h3 class="text-base font-semibold leading-[18px] text-main-blue1h dark:text-white">
      {{ title }}
    </h3>
    <app-button (click)="closeModal()" variant="primary" size="sm" styleType="ghost">
      <svg class="w-4 h-4">
        <use xlink:href="/assets/icons/outline/general.svg#close" />
      </svg>
    </app-button>
  </div>

  <!-- min-h-72 -->
  <div class="relative min-h-[60vh]">
    <app-loader
      [visible]="loadingPdf"
      [fullscreen]="false"
      [overlay]="false"
    />

    @if (isImage) {
      <img [src]="previewFile" class="w-full" />
    } @else {
      <ngx-doc-viewer
        [url]="previewFile"
        class="w-full h-[60vh]"
        (loaded)="onDocumentLoaded()"
        [googleCheckInterval]="1500"
        [googleMaxChecks]="15"
        disableContent="popout-hide"
      ></ngx-doc-viewer>
    }
  </div>

  <div class="flex flex-wrap justify-end gap-2">
    <app-button
      (click)="closeModal()"
      variant="gray"
      styleType="soft"
      size="md"
      customClass="leading-4">
      Cerrar
    </app-button>
    <app-button
      (onClick)="openDoc()"
      variant="primary"
      styleType="solid"
      size="md"
      customClass="leading-4 whitespace-nowrap">
      Abrir documento
    </app-button>
  </div>
</div>
