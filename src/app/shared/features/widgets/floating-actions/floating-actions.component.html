<div class="fixed left-0 right-0 bottom-6 sm:w-auto sm:left-auto sm:bottom-12 sm:right-12 px-4 sm:px-0 z-30">
  <app-popover
    [title]="'¿Necesitas ayuda?'"
    [text]="'Accede a ayuda y al recorrido en un click.'"
    [placement]="'left-end'"
    [triggerType]="'manual'"
    [highlighted]="true"
    [(visible)]="menuTutorialVisible"
    [contentTemplate]="popoverContent"
    extraPopoverClass="w-[330px] md:w-[487px] max-w-[100vw]"
    customTriggerClass="before:rounded-2xl"
    [autoScrollOnOpen]="true"
    (onClose)="nextTutorialStep()">

    <ng-template #triggerTemplate>
      <div class="flex flex-wrap sm:flex-col sm:justify-end gap-2">
        @for (action of floatingActions; track action.key) {
          @if (action.isVisible()) {
            <app-button
              variant="white"
              size="md"
              styleType="solid"
              class="flex-1 sm:flex-auto min-w-[193px] sm:min-w-0"
              customClass="ms-auto w-full sm:w-auto flex justify-center"
              (onClick)="action.onClick()">
              {{ action.label }}
              <svg class="w-5 h-5">
                <use [attr.xlink:href]="action.iconHref" />
              </svg>
            </app-button>
          }
        }
      </div>
    </ng-template>

  </app-popover>
</div>


<!-- Tutorial popover content -->
<ng-template #popoverContent>
  <div class="flex justify-between items-center gap-2">
    <span class="text-base leading-5 md:leading-[1.125rem] font-normal text-main-blue1h whitespace-nowrap">
      3 de 3
    </span>
    <div class="flex gap-2">
      <app-button
        (click)="backTutorialStep()"
        variant="primary"
        styleType="ghost"
        size="md"
        class="hidden md:block"
        customClass="leading-4">
        Atrás
      </app-button>
      <app-button
        (click)="nextTutorialStep()"
        variant="primary"
        styleType="solid"
        size="md"
        class="hidden md:block"
        customClass="leading-4">
        Entendido
      </app-button>
      <app-button
        (click)="nextTutorialStep()"
        variant="primary"
        styleType="solid"
        size="sm"
        class="block md:hidden"
        customClass="leading-4">
        Entendido
      </app-button>
    </div>
  </div>
</ng-template>
