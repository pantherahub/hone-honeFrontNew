<div class="flex justify-center mx-4">
  <div class="max-w-screen-xl w-full pt-10 pb-28 md:pt-12 flex flex-col gap-4">

    <div class="flex flex-wrap items-center gap-3">
      <app-button
        (onClick)="goBack()"
        variant="primary"
        size="sm"
        styleType="ghost"
        customClass="leading-4">
        <svg class="w-4 h-4">
          <use xlink:href="/assets/icons/outline/arrows.svg#chevron-left" />
        </svg>
        Volver
      </app-button>

      @if (isLogged) {
        <app-button
          (onClick)="goToTickets()"
          variant="gray"
          size="sm"
          styleType="soft"
          customClass="leading-4">
          <svg class="w-4 h-4">
            <use xlink:href="/assets/icons/outline/general.svg#arrow-up-right-from-square" />
          </svg>
          Ver mis PQRS
        </app-button>
      }
    </div>

    <div class="flex flex-col gap-6">
      <h2 class="text-xl font-black leading-[1.375rem] text-main-blue1h">
        PQRS #{{ ticket?.idTickets ?? idTicket }}
      </h2>

      @if (idTicket && (isLogged || creatorIdentification)) {
        <app-ticket-content
          [idTicket]="idTicket"
          [creatorIdentification]="creatorIdentification"
          (ticketChange)="onTicketChange($event)">
        </app-ticket-content>
      } @else if (!isLogged && !creatorIdentification) {
        <app-alert
          variant="danger"
          [title]="'No se encontró la PQRS'"
          [text]="'Verifica que el enlace sea correcto o contacta soporte.'"
          [customIconPath]="'/assets/icons/outline/general.svg#close'">
        </app-alert>
      }
    </div>

  </div>
</div>
